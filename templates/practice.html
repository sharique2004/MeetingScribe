<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screener — practice the recruiter screen</title>
<style>
:root {
  --font-ui: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
  --font-mono: ui-monospace, "SF Mono", "Menlo", monospace;
  --r-sm: 6px; --r-md: 9px; --r-lg: 13px;
}
html[data-theme="dark"] {
  color-scheme: dark;
  --bg: #121319; --panel: #1a1b22; --panel-2: #21222b; --panel-3: #2a2b35;
  --border: rgba(255,255,255,.08); --border-strong: rgba(255,255,255,.16);
  --text: #ecedf3; --text-dim: #9a9bab; --text-faint: #65667a;
  --shadow: 0 8px 30px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.05);
  --accent: #7c8cf0; --accent-ink: #0a0c1a;
  --ok: #43c08a; --warn: #d9a13c; --danger: #e0524d;
  --mark: rgba(124,140,240,.26);
}
html[data-theme="light"] {
  color-scheme: light;
  --bg: #f2f3f6; --panel: #ffffff; --panel-2: #f5f6f9; --panel-3: #ebecf1;
  --border: rgba(20,22,40,.1); --border-strong: rgba(20,22,40,.2);
  --text: #181a22; --text-dim: #5d5f70; --text-faint: #9092a3;
  --shadow: 0 8px 30px rgba(20,22,50,.16), 0 0 0 1px rgba(20,22,40,.05);
  --accent: #5a63d8; --accent-ink: #ffffff;
  --ok: #1f8a5b; --warn: #a3700a; --danger: #c2362f;
  --mark: rgba(90,99,216,.2);
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body { margin: 0; font-family: var(--font-ui); font-size: 14px; line-height: 1.5; color: var(--text); background: var(--bg); -webkit-font-smoothing: antialiased; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }
input, select, textarea { font: inherit; color: inherit; }
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

header { display: flex; align-items: center; gap: 11px; padding: 13px 22px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: color-mix(in oklab, var(--bg) 86%, transparent); backdrop-filter: blur(8px); z-index: 10; }
.logo { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; background: linear-gradient(145deg, var(--accent), color-mix(in oklab, var(--accent) 65%, #000)); color: #fff; }
.brand { font-size: 14.5px; font-weight: 650; letter-spacing: -0.01em; }
.tagline { font-size: 12.5px; color: var(--text-dim); }
.h-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.health { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-dim); }
.health .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); }
.health .dot.bad { background: var(--danger); }
.iconbtn { width: 30px; height: 30px; border-radius: var(--r-sm); display: grid; place-items: center; color: var(--text-dim); border: 1px solid var(--border); }
.iconbtn:hover { background: var(--panel-2); color: var(--text); }

.wrap { max-width: 760px; margin: 0 auto; padding: 26px 22px 80px; }
.kicker { font-size: 11px; font-weight: 650; letter-spacing: .09em; text-transform: uppercase; color: var(--text-faint); margin-bottom: 7px; }
h1 { font-size: 23px; font-weight: 700; letter-spacing: -0.02em; margin: 0 0 20px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12.5px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }
.field input[type=text], .field textarea, .field select { width: 100%; background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: var(--r-md); padding: 9px 11px; outline: none; }
.field textarea { min-height: 76px; resize: vertical; line-height: 1.5; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: color-mix(in oklab, var(--accent) 55%, transparent); }
.field .hint { font-size: 11.5px; color: var(--text-faint); margin-top: 5px; }
.row { display: flex; gap: 12px; }
.row .field { flex: 1; }
.btn { height: 38px; padding: 0 16px; display: inline-flex; align-items: center; justify-content: center; gap: 8px; border-radius: var(--r-md); font-size: 13.5px; font-weight: 600; border: 1px solid var(--border); background: var(--panel); color: var(--text); }
.btn:hover { background: var(--panel-2); }
.btn.primary { background: var(--accent); color: var(--accent-ink); border-color: transparent; }
.btn.primary:hover { filter: brightness(1.08); }
.btn.danger { color: var(--danger); }
.btn:disabled { opacity: .55; cursor: default; }
.btn.wide { width: 100%; height: 42px; font-size: 14px; }

.recent { margin-top: 26px; border-top: 1px solid var(--border); padding-top: 16px; }
.recent h2 { font-size: 11px; font-weight: 650; letter-spacing: .08em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 10px; }
.recent-item { display: flex; align-items: center; gap: 10px; padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--r-md); background: var(--panel); margin-bottom: 7px; cursor: pointer; }
.recent-item:hover { border-color: color-mix(in oklab, var(--accent) 50%, transparent); }
.recent-item .ri-title { font-weight: 600; font-size: 13px; }
.recent-item .ri-meta { font-size: 11.5px; color: var(--text-faint); margin-top: 1px; }
.recent-item .ri-del { margin-left: auto; color: var(--text-faint); padding: 4px; border-radius: 4px; }
.recent-item .ri-del:hover { color: var(--danger); }
.badge { font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
.badge.rec-strong_yes, .badge.rec-yes { background: color-mix(in oklab, var(--ok) 20%, transparent); color: var(--ok); }
.badge.rec-lean_yes { background: color-mix(in oklab, var(--accent) 20%, transparent); color: var(--accent); }
.badge.rec-lean_no, .badge.rec-no { background: color-mix(in oklab, var(--danger) 18%, transparent); color: var(--danger); }

/* interview */
.progress { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; font-size: 12px; color: var(--text-dim); }
.progress .bar { flex: 1; height: 4px; border-radius: 2px; background: var(--panel-3); overflow: hidden; }
.progress .bar i { display: block; height: 100%; background: var(--accent); transition: width .3s; }
.turn { margin-bottom: 18px; }
.q { display: flex; gap: 10px; }
.q .who { font-size: 11px; font-weight: 700; color: var(--accent); flex: none; width: 78px; padding-top: 2px; text-transform: uppercase; letter-spacing: .04em; }
.q .body { min-width: 0; flex: 1; }
.q .text { font-size: 15px; line-height: 1.55; }
.a { display: flex; gap: 10px; margin-top: 10px; }
.a .who { font-size: 11px; font-weight: 700; color: var(--text-dim); flex: none; width: 78px; padding-top: 2px; text-transform: uppercase; letter-spacing: .04em; }
.a .text { font-size: 14px; color: var(--text); white-space: pre-wrap; }
.assess { margin: 9px 0 0 88px; border-left: 2px solid color-mix(in oklab, var(--accent) 50%, transparent); padding: 2px 0 2px 12px; }
.assess .line { font-size: 13px; color: var(--text-dim); }
.assess .scores { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.chip { font-size: 11px; padding: 2px 8px; border-radius: 99px; border: 1px solid var(--border); color: var(--text-dim); display: inline-flex; gap: 5px; }
.chip b { color: var(--text); font-weight: 600; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }
.tag { font-size: 11.5px; padding: 2px 9px; border-radius: 99px; }
.tag.good { background: color-mix(in oklab, var(--ok) 16%, transparent); color: var(--ok); }
.tag.bad { background: color-mix(in oklab, var(--warn) 16%, transparent); color: var(--warn); }

.ask { border: 1px solid var(--border-strong); border-radius: var(--r-lg); background: var(--panel); padding: 16px; margin-top: 8px; box-shadow: var(--shadow); }
.ask .qline { font-size: 15px; line-height: 1.55; margin-bottom: 14px; }
.ask .qline .who { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 5px; }
.answer-tools { display: flex; align-items: center; gap: 10px; }
.rec-btn { height: 40px; padding: 0 18px; border-radius: 99px; display: inline-flex; align-items: center; gap: 9px; font-weight: 600; font-size: 13.5px; background: var(--accent); color: var(--accent-ink); }
.rec-btn.recording { background: var(--danger); color: #fff; }
.rec-btn .dot { width: 9px; height: 9px; border-radius: 50%; background: currentColor; }
.rec-btn.recording .dot { animation: blink 1.3s infinite; }
@keyframes blink { 50% { opacity: .3; } }
.rec-timer { font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); }
.link { font-size: 12.5px; color: var(--text-dim); margin-left: auto; }
.link:hover { color: var(--accent); }
.answer-box { width: 100%; background: var(--panel-2); color: var(--text); border: 1px solid var(--border); border-radius: var(--r-md); padding: 10px 12px; min-height: 92px; outline: none; resize: vertical; line-height: 1.5; }
.answer-box:focus { border-color: color-mix(in oklab, var(--accent) 55%, transparent); }
.thinking { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 13px; margin-top: 8px; }
.spinner { width: 14px; height: 14px; border-radius: 50%; border: 2px solid color-mix(in oklab, var(--accent) 30%, transparent); border-top-color: var(--accent); animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.finish-row { margin-top: 18px; display: flex; gap: 10px; align-items: center; }

/* report */
.verdict-card { border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--panel); padding: 20px; margin-bottom: 18px; }
.verdict-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.verdict-head h2 { margin: 0; font-size: 17px; }
.verdict-text { font-size: 14.5px; line-height: 1.6; color: var(--text); }
.score-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 18px 0; }
.score-cell .sc-label { font-size: 11.5px; color: var(--text-dim); text-transform: capitalize; margin-bottom: 5px; }
.score-cell .sc-bar { height: 6px; border-radius: 3px; background: var(--panel-3); overflow: hidden; }
.score-cell .sc-bar i { display: block; height: 100%; background: var(--accent); }
.score-cell .sc-num { font-size: 12px; color: var(--text); margin-top: 4px; font-weight: 600; }
.report-sec { margin-bottom: 18px; }
.report-sec h3 { font-size: 12px; font-weight: 650; letter-spacing: .05em; text-transform: uppercase; color: var(--text-faint); margin: 0 0 9px; }
.fix-list { list-style: none; padding: 0; margin: 0; counter-reset: f; }
.fix-list li { display: flex; gap: 11px; padding: 9px 0; border-top: 1px solid var(--border); font-size: 14px; }
.fix-list li:first-child { border-top: none; }
.fix-list li::before { counter-increment: f; content: counter(f); flex: none; width: 22px; height: 22px; border-radius: 50%; background: color-mix(in oklab, var(--accent) 18%, transparent); color: var(--accent); font-size: 12px; font-weight: 700; display: grid; place-items: center; }
.callout { border: 1px solid var(--border); border-radius: var(--r-md); background: var(--panel); padding: 14px; }
.callout .c-q { font-weight: 600; font-size: 13.5px; margin-bottom: 7px; }
.callout .c-better { font-size: 13.5px; color: var(--text-dim); line-height: 1.55; }
.callout .c-better b { color: var(--ok); font-weight: 600; }

#toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: var(--panel); color: var(--text); padding: 10px 16px; border-radius: var(--r-md); box-shadow: var(--shadow); display: none; z-index: 90; font-size: 13px; max-width: 80vw; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: color-mix(in oklab, var(--text) 16%, transparent); border-radius: 5px; border: 3px solid transparent; background-clip: content-box; }
</style>
</head>
<body>
<header>
  <button class="iconbtn" onclick="location.href='/'" title="Back to MeetingScribe" style="margin-right:2px">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div class="logo" aria-hidden="true">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
  </div>
  <div>
    <div class="brand">Screener</div>
  </div>
  <span class="tagline">practice the recruiter screen — on your machine</span>
  <div class="h-right">
    <div class="health" id="health"></div>
    <button class="iconbtn" id="newBtn" onclick="newInterview()" title="New interview">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="iconbtn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme"></button>
  </div>
</header>
<div class="wrap" id="wrap"></div>
<div id="toast"></div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const S = { screen: "setup", session: null, recents: [], busy: false, theme: localStorage.getItem("scrTheme") || "dark", typed: false };
document.documentElement.setAttribute("data-theme", S.theme);

function esc(s){ return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function toast(m, ms=3500){ const t=$("toast"); t.textContent=m; t.style.display="block"; clearTimeout(t._h); t._h=setTimeout(()=>t.style.display="none", ms); }
function fmtClock(s){ s=Math.max(0,Math.floor(s)); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
async function api(path, opts){ const r=await fetch(path, opts); let b=null; try{b=await r.json();}catch(e){} if(!r.ok) throw new Error((b&&b.error)||r.statusText); return b; }
function postJSON(path, data){ return api(path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(data)}); }
const REC_LABEL = {strong_yes:"Strong yes", yes:"Yes", lean_yes:"Lean yes", lean_no:"Lean no", no:"No"};

function toggleTheme(){ S.theme = S.theme==="dark"?"light":"dark"; localStorage.setItem("scrTheme", S.theme); document.documentElement.setAttribute("data-theme", S.theme); renderThemeBtn(); }
function renderThemeBtn(){ $("themeBtn").innerHTML = S.theme==="dark"
  ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>'
  : '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>'; }

async function loadHealth(){
  try { const h = await api("/api/practice/health");
    $("health").innerHTML = h.llm
      ? `<span class="dot"></span>On-device AI ready${h.transcribe?" · voice on":""}`
      : `<span class="dot bad"></span>${h.llm_message || "on-device AI unavailable"}`;
  } catch(e){ $("health").innerHTML = ""; }
}
async function loadRecents(){ try { S.recents = await api("/api/practice/sessions"); } catch(e){ S.recents = []; } }

/* ---------------------------------------------------------------- setup -- */
function newInterview(){ S.screen="setup"; S.session=null; render(); }
function renderSetup(){
  const r = S.recents.length ? `
    <div class="recent">
      <h2>Recent interviews</h2>
      ${S.recents.slice(0,6).map(s => `
        <div class="recent-item" onclick="openSession('${s.id}')">
          <div>
            <div class="ri-title">${esc(s.role)}${s.company?` · ${esc(s.company)}`:""}</div>
            <div class="ri-meta">${esc((s.created||"").replace("T"," ").slice(0,16))} · ${s.answered} answered${s.status==="done"?" · done":""}</div>
          </div>
          ${s.recommendation?`<span class="badge rec-${esc(s.recommendation)}">${esc(REC_LABEL[s.recommendation]||s.recommendation)}</span>`:""}
          <button class="ri-del" title="Delete" onclick="event.stopPropagation();delSession('${s.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
          </button>
        </div>`).join("")}
    </div>` : "";
  $("wrap").innerHTML = `
    <div class="kicker">New mock interview</div>
    <h1>Set up your interview</h1>
    <div class="row">
      <div class="field"><label>Role</label><input type="text" id="f-role" placeholder="e.g. Machine Learning Engineer"></div>
      <div class="field"><label>Company (optional)</label><input type="text" id="f-company" placeholder="e.g. Razor"></div>
    </div>
    <div class="field"><label>Job description (optional)</label>
      <textarea id="f-jd" placeholder="Paste the JD so questions and judging are tailored to it."></textarea></div>
    <div class="field"><label>Your background / resume (optional)</label>
      <textarea id="f-resume" placeholder="Paste your resume or a few lines about your experience — the interviewer will probe it."></textarea></div>
    <div class="row">
      <div class="field"><label>Interviewer style</label>
        <select id="f-persona">
          <option value="recruiter">Realistic recruiter</option>
          <option value="coach">Supportive coach</option>
          <option value="bar_raiser">Tough bar-raiser</option>
        </select></div>
      <div class="field"><label>Difficulty</label>
        <select id="f-difficulty"><option value="easy">Easy</option><option value="normal" selected>Normal</option><option value="hard">Hard</option></select></div>
      <div class="field"><label>Questions</label>
        <select id="f-questions"><option>4</option><option selected>6</option><option>8</option><option>10</option></select></div>
    </div>
    <button class="btn primary wide" id="startBtn" onclick="startInterview()">Start interview</button>
    ${r}`;
}
async function startInterview(){
  const btn = $("startBtn"); btn.disabled = true; btn.textContent = "Preparing your interviewer…";
  const body = {
    role: $("f-role").value, company: $("f-company").value,
    job_description: $("f-jd").value, resume: $("f-resume").value,
    persona: $("f-persona").value, difficulty: $("f-difficulty").value,
    questions: parseInt($("f-questions").value, 10),
  };
  try {
    S.session = await postJSON("/api/practice/session", body);
    S.screen = "interview"; render(); loadRecents();
  } catch(e){ toast("⚠ " + e.message, 6000); btn.disabled=false; btn.textContent="Start interview"; }
}

/* ------------------------------------------------------------ interview -- */
function scoreChips(scores){
  return Object.entries(scores||{}).map(([k,v]) => `<span class="chip">${esc(k)} <b>${v}</b></span>`).join("");
}
function turnHTML(t, n){
  const tags = [
    ...(t.strengths||[]).map(s => `<span class="tag good">+ ${esc(s)}</span>`),
    ...(t.concerns||[]).map(s => `<span class="tag bad">△ ${esc(s)}</span>`),
  ].join("");
  return `<div class="turn">
    <div class="q"><div class="who">${t.is_follow_up?"Follow-up":"Question "+n}</div>
      <div class="body"><div class="text">${esc(t.question)}</div></div></div>
    <div class="a"><div class="who">You</div><div class="text">${esc(t.answer)}</div></div>
    <div class="assess">
      <div class="line">${esc(t.assessment)}</div>
      <div class="scores">${scoreChips(t.scores)}</div>
      ${tags?`<div class="tags">${tags}</div>`:""}
    </div>
  </div>`;
}
function renderInterview(){
  const s = S.session;
  const total = s.total;
  const pct = Math.min(100, Math.round((s.turns.length/total)*100));
  let html = `
    <div class="progress"><span class="mono">${Math.min(s.turns.length, total)}/${total}</span>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <span>${esc(s.config.role||"Interview")}${s.config.company?" · "+esc(s.config.company):""}</span></div>`;
  let n = 0;
  html += s.turns.map(t => { if(!t.is_follow_up) n++; return turnHTML(t, n); }).join("");

  if (S.busy) {
    html += `<div class="ask"><div class="thinking"><span class="spinner"></span>The interviewer is considering your answer…</div></div>`;
  } else if (s.current_question) {
    html += `<div class="ask">
      <div class="qline"><span class="who">Interviewer</span>${esc(s.current_question)}</div>
      <div id="answerArea"></div>
    </div>`;
  } else {
    html += `<div class="ask">
      <div class="qline"><span class="who">Interviewer</span>That's all my questions. Ready for your scorecard?</div>
      <button class="btn primary" id="finishBtn" onclick="finishInterview()">See my scorecard</button>
    </div>`;
  }
  if (s.turns.length && s.current_question) {
    html += `<div class="finish-row"><button class="link" onclick="finishInterview()">End early &amp; get my scorecard →</button></div>`;
  }
  $("wrap").innerHTML = html;
  if (s.current_question && !S.busy) renderAnswerArea();
  window.scrollTo({top: document.body.scrollHeight, behavior: "smooth"});
}
function renderAnswerArea(){
  if (REC.on) teardownRec();  // never leave a mic stream live across a re-render
  const area = $("answerArea");
  if (!area) return;
  if (S.typed) {
    area.innerHTML = `
      <textarea class="answer-box" id="typedAnswer" placeholder="Type your answer…"></textarea>
      <div class="answer-tools" style="margin-top:10px">
        <button class="btn primary" onclick="submitTyped()">Submit answer</button>
        <button class="link" onclick="S.typed=false;renderAnswerArea()">Answer by voice instead</button>
      </div>`;
    $("typedAnswer").focus();
  } else {
    area.innerHTML = `
      <div class="answer-tools">
        <button class="rec-btn" id="recBtn" onclick="toggleRecord()"><span class="dot"></span><span id="recLabel">Record your answer</span></button>
        <span class="rec-timer" id="recTimer"></span>
        <button class="link" onclick="S.typed=true;renderAnswerArea()">Type instead</button>
      </div>`;
  }
}

/* ---- voice capture: records a real WAV client-side (no ffmpeg needed) ---- */
const REC = { ctx:null, stream:null, proc:null, gain:null, chunks:[], sr:0, t0:0, timer:0, on:false, stopping:false };
async function toggleRecord(){
  if (REC.stopping) return;
  if (REC.on) return stopRecord();
  try {
    REC.stream = await navigator.mediaDevices.getUserMedia({audio:true});
  } catch(e){ toast("⚠ Microphone permission denied — use Type instead.", 6000); S.typed=true; renderAnswerArea(); return; }
  REC.ctx = new (window.AudioContext||window.webkitAudioContext)();
  REC.sr = REC.ctx.sampleRate;
  const src = REC.ctx.createMediaStreamSource(REC.stream);
  REC.proc = REC.ctx.createScriptProcessor(4096, 1, 1);
  REC.gain = REC.ctx.createGain(); REC.gain.gain.value = 0; // silence monitor path (no echo)
  REC.chunks = [];
  REC.proc.onaudioprocess = (e) => { REC.chunks.push(new Float32Array(e.inputBuffer.getChannelData(0))); };
  src.connect(REC.proc); REC.proc.connect(REC.gain); REC.gain.connect(REC.ctx.destination);
  REC.on = true; REC.t0 = Date.now();
  $("recBtn").classList.add("recording"); $("recLabel").textContent = "Stop & submit";
  REC.timer = setInterval(() => { $("recTimer").textContent = fmtClock((Date.now()-REC.t0)/1000); }, 250);
}
function teardownRec(){
  clearInterval(REC.timer);
  try { REC.proc && (REC.proc.onaudioprocess=null, REC.proc.disconnect()); } catch(e){}
  try { REC.gain && REC.gain.disconnect(); } catch(e){}
  try { REC.stream && REC.stream.getTracks().forEach(t=>t.stop()); } catch(e){}
  try { REC.ctx && REC.ctx.close(); } catch(e){}
  REC.on = false;
  REC.ctx = REC.stream = REC.proc = REC.gain = null;  // let the old graph be GC'd
}
function encodeWAV(chunks, sr){
  let len = 0; for (const c of chunks) len += c.length;
  const data = new Float32Array(len); let off=0;
  for (const c of chunks){ data.set(c, off); off += c.length; }
  const buf = new ArrayBuffer(44 + data.length*2), view = new DataView(buf);
  const ws = (o,s) => { for(let i=0;i<s.length;i++) view.setUint8(o+i, s.charCodeAt(i)); };
  ws(0,"RIFF"); view.setUint32(4, 36+data.length*2, true); ws(8,"WAVE"); ws(12,"fmt ");
  view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,1,true);
  view.setUint32(24,sr,true); view.setUint32(28,sr*2,true); view.setUint16(32,2,true); view.setUint16(34,16,true);
  ws(36,"data"); view.setUint32(40, data.length*2, true);
  let p=44; for (let i=0;i<data.length;i++){ const x=Math.max(-1,Math.min(1,data[i])); view.setInt16(p, x<0?x*0x8000:x*0x7fff, true); p+=2; }
  return new Blob([view], {type:"audio/wav"});
}
async function stopRecord(){
  if (REC.stopping || !REC.on) return;
  REC.stopping = true;
  const chunks = REC.chunks, sr = REC.sr;
  teardownRec();
  if ($("recBtn")) { $("recBtn").classList.remove("recording"); $("recLabel").textContent="Record your answer"; }
  try {
    let total=0; for(const c of chunks) total += c.length;
    if (total < sr*0.4){ toast("That was too short — try again or type your answer."); return; }
    const wav = encodeWAV(chunks, sr);
    const fd = new FormData(); fd.append("audio", wav, "answer.wav");
    await submitAnswer(() => fetch(`/api/practice/session/${S.session.id}/answer`, {method:"POST", body:fd}));
  } finally {
    REC.stopping = false;
  }
}
function submitTyped(){
  const text = ($("typedAnswer").value || "").trim();
  if (!text){ toast("Type something first."); return; }
  submitAnswer(() => fetch(`/api/practice/session/${S.session.id}/answer`, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({text})}));
}
async function submitAnswer(send){
  if (S.busy) return;
  S.busy = true; renderInterview();
  try {
    const res = await send();
    let body=null; try{body=await res.json();}catch(e){}
    if (!res.ok) throw new Error((body&&body.error)||res.statusText);
    S.session.turns.push(body.turn);
    S.session.current_question = body.next_question;
    S.session.index = body.index;
  } catch(e){ toast("⚠ " + e.message, 6000); }
  S.busy = false; renderInterview();
}
async function finishInterview(){
  if (S.busy) return;
  S.busy = true;
  const b = $("finishBtn"); if (b){ b.disabled=true; b.textContent="Writing your scorecard…"; }
  try {
    const r = await postJSON(`/api/practice/session/${S.session.id}/finish`, {});
    S.session.report = r.report; S.session.status = "done"; S.session.current_question=null;
    S.screen = "report"; render(); loadRecents();
  } catch(e){ toast("⚠ " + e.message, 6000); }
  S.busy = false;
}

/* --------------------------------------------------------------- report -- */
function renderReport(){
  const s = S.session, rep = s.report || {};
  const sc = rep.scores || {};
  const rec = rep.recommendation || "lean_yes";
  let html = `
    <div class="kicker">Scorecard</div>
    <h1>${esc(s.config.role||"Practice interview")}${s.config.company?` · ${esc(s.config.company)}`:""}</h1>
    <div class="verdict-card">
      <div class="verdict-head"><h2>Recruiter's verdict</h2>
        <span class="badge rec-${esc(rec)}">${esc(REC_LABEL[rec]||rec)}</span></div>
      <div class="verdict-text">${esc(rep.verdict||"")}</div>
      <div class="score-grid">
        ${["communication","technical","structure","specificity"].map(k => `
          <div class="score-cell"><div class="sc-label">${k}</div>
            <div class="sc-bar"><i style="width:${(sc[k]||0)*10}%"></i></div>
            <div class="sc-num">${sc[k]||0} / 10</div></div>`).join("")}
      </div>
    </div>`;
  if ((rep.top_fixes||[]).length){
    html += `<div class="report-sec"><h3>Top fixes</h3>
      <ul class="fix-list">${rep.top_fixes.map(f=>`<li>${esc(f)}</li>`).join("")}</ul></div>`;
  }
  if (rep.strongest_moment){
    html += `<div class="report-sec"><h3>Strongest moment</h3>
      <div class="callout"><div class="c-better">${esc(rep.strongest_moment)}</div></div></div>`;
  }
  if (rep.weakest_answer && rep.weakest_answer.question){
    html += `<div class="report-sec"><h3>Weakest answer — and a stronger one</h3>
      <div class="callout"><div class="c-q">${esc(rep.weakest_answer.question)}</div>
        <div class="c-better"><b>Try:</b> ${esc(rep.weakest_answer.better_answer||"")}</div></div></div>`;
  }
  html += `<div class="report-sec"><h3>Full transcript</h3>`;
  let n=0;
  html += s.turns.map(t => { if(!t.is_follow_up) n++; return turnHTML(t, n); }).join("");
  html += `</div>
    <div class="finish-row">
      <button class="btn" onclick="location.href='/practice/sessions/${s.id}.md'">Download Markdown</button>
      <button class="btn primary" onclick="newInterview()">New interview</button>
    </div>`;
  $("wrap").innerHTML = html;
}
// serve markdown directly from sessions dir
async function openSession(id){
  try { S.session = await api("/api/practice/session/"+id);
    S.screen = S.session.status==="done" && S.session.report ? "report" : "interview";
    if (S.screen==="interview" && !S.session.current_question && !S.session.report){
      // an unfinished session with no pending question -> let them finish
    }
    render();
  } catch(e){ toast("⚠ " + e.message); }
}
async function delSession(id){
  if (!confirm("Delete this interview?")) return;
  try { await api("/api/practice/session/"+id, {method:"DELETE"}); await loadRecents(); render(); }
  catch(e){ toast("⚠ " + e.message); }
}

function render(){
  if (S.screen==="setup") renderSetup();
  else if (S.screen==="interview") renderInterview();
  else if (S.screen==="report") renderReport();
}

(async function boot(){
  renderThemeBtn();
  await Promise.all([loadHealth(), loadRecents()]);
  const deep = new URLSearchParams(location.search).get("s");
  if (deep) { await openSession(deep); return; }
  render();
})();
</script>
